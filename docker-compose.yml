version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: indian-stock-basket-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - stock-basket-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: indian-stock-basket-api
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/indian-stock-basket?authSource=admin
      PORT: 5000
      NODE_ENV: production
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - stock-basket-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: indian-stock-basket-ui
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - stock-basket-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  stock-basket-network:
    driver: bridge
